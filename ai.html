<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iSpy Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px;
  }

  h1 {
    font-size: 2.2rem;
    letter-spacing: 2px;
    margin-bottom: 6px;
    color: #f0e68c;
    text-shadow: 0 0 12px rgba(240,230,140,0.4);
  }

  #subtitle {
    font-size: 1rem;
    color: #aaa;
    margin-bottom: 16px;
  }

  #clue-banner {
    background: #16213e;
    border: 2px solid #f0e68c;
    border-radius: 12px;
    padding: 12px 28px;
    font-size: 1.1rem;
    font-weight: 600;
    color: #f0e68c;
    text-align: center;
    margin-bottom: 14px;
    letter-spacing: 0.5px;
  }

  #hud {
    display: flex;
    gap: 24px;
    margin-bottom: 14px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .hud-item {
    background: #16213e;
    border: 1.5px solid #444;
    border-radius: 10px;
    padding: 8px 20px;
    font-size: 1rem;
    font-weight: 600;
    color: #e0e0e0;
    min-width: 110px;
    text-align: center;
  }

  .hud-label {
    font-size: 0.72rem;
    font-weight: 400;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 2px;
  }

  #progress-bar-wrap {
    width: 100%;
    max-width: 740px;
    background: #16213e;
    border-radius: 8px;
    height: 10px;
    margin-bottom: 14px;
    overflow: hidden;
  }

  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #f0e68c, #ffd700);
    border-radius: 8px;
    transition: width 0.4s ease;
    width: 0%;
  }

  #scene-wrapper {
    position: relative;
    width: 100%;
    max-width: 740px;
    border: 3px solid #333;
    border-radius: 16px;
    overflow: hidden;
    background: #e8f4e8;
    cursor: default;
    user-select: none;
  }

  #scene-canvas {
    display: block;
    width: 100%;
    height: auto;
  }

  .spy-item {
    position: absolute;
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    line-height: 1;
    opacity: 0.28;
    filter: blur(1.2px) saturate(0.4) brightness(1.1);
    mix-blend-mode: multiply;
    transition: transform 0.2s ease, filter 0.2s ease, opacity 0.2s ease;
  }

  .spy-item:hover {
    opacity: 0.75;
    filter: blur(0px) saturate(1) brightness(1.1);
    transform: scale(1.18);
    mix-blend-mode: normal;
  }

  .spy-item.found {
    opacity: 1;
    filter: brightness(1.3) drop-shadow(0 0 6px #ffe066);
    mix-blend-mode: normal;
    pointer-events: none;
    cursor: default;
  }

  .spy-item.found::after {
    content: '✓';
    position: absolute;
    top: -8px;
    right: -8px;
    background: #2ecc71;
    color: #fff;
    font-size: 0.72rem;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    line-height: 1;
  }

  #found-flash {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(46,204,113,0.95);
    color: #fff;
    font-size: 1.6rem;
    font-weight: 700;
    padding: 18px 40px;
    border-radius: 14px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 999;
  }

  #found-flash.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  #win-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,30,0.92);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }

  #win-screen.show { display: flex; }

  #win-screen h2 {
    font-size: 2.6rem;
    color: #f0e68c;
    letter-spacing: 3px;
  }

  #win-screen p { font-size: 1.1rem; color: #ccc; }

  #win-screen button {
    background: #f0e68c;
    color: #1a1a2e;
    border: none;
    border-radius: 10px;
    padding: 12px 32px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    margin-top: 8px;
    transition: background 0.2s, transform 0.1s;
  }

  #win-screen button:hover { background: #ffd700; transform: scale(1.04); }

  #found-list {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 8px;
    max-width: 740px;
    width: 100%;
    justify-content: center;
  }

  .found-badge {
    background: #16213e;
    border: 1.5px solid #555;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.85rem;
    color: #888;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.3s;
  }

  .found-badge.done {
    border-color: #2ecc71;
    color: #2ecc71;
  }

  .found-badge .badge-icon { font-size: 1rem; }

  #level-select {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }

  .level-btn {
    background: #16213e;
    border: 1.5px solid #555;
    color: #ccc;
    border-radius: 8px;
    padding: 6px 18px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }

  .level-btn:hover, .level-btn.active {
    border-color: #f0e68c;
    color: #f0e68c;
    background: #1e2a4a;
  }
</style>
</head>
<body>

<h1>👁 iSpy</h1>
<div id="subtitle">Find the hidden objects in the scene!</div>

<div id="level-select">
  <button class="level-btn active" onclick="loadLevel(0)">🌳 Park</button>
  <button class="level-btn" onclick="loadLevel(1)">🏠 Bedroom</button>
  <button class="level-btn" onclick="loadLevel(2)">🌊 Beach</button>
</div>

<div id="clue-banner">I spy with my little eye...</div>

<div id="hud">
  <div class="hud-item">
    <span class="hud-label">Found</span>
    <span id="score">0 / 0</span>
  </div>
  <div class="hud-item">
    <span class="hud-label">Time</span>
    <span id="timer">0:00</span>
  </div>
  <div class="hud-item">
    <span class="hud-label">Clicks</span>
    <span id="clicks">0</span>
  </div>
</div>

<div id="progress-bar-wrap"><div id="progress-bar"></div></div>

<div id="scene-wrapper">
  <canvas id="scene-canvas" width="740" height="460"></canvas>
</div>

<div id="found-list"></div>
<div id="found-flash">Found it! 🎉</div>

<div id="win-screen">
  <h2>🎉 You Win!</h2>
  <p id="win-stats"></p>
  <p style="color:#aaa; font-size:0.9rem;">Try another level!</p>
  <button onclick="loadLevel(currentLevel)">Play Again</button>
</div>

<script>
const levels = [
  {
    name: "Park",
    clue: "Find all 7 hidden objects in the park!",
    drawBg: drawPark,
    items: [
      { emoji: "🐝", label: "bee",        x: 0.72, y: 0.18, size: 32 },
      { emoji: "🍄", label: "mushroom",   x: 0.14, y: 0.68, size: 34 },
      { emoji: "🦋", label: "butterfly",  x: 0.45, y: 0.22, size: 32 },
      { emoji: "🐛", label: "caterpillar",x: 0.61, y: 0.76, size: 30 },
      { emoji: "⭐", label: "star",       x: 0.29, y: 0.13, size: 30 },
      { emoji: "🍎", label: "apple",      x: 0.83, y: 0.55, size: 32 },
      { emoji: "🐞", label: "ladybug",    x: 0.38, y: 0.61, size: 30 },
    ]
  },
  {
    name: "Bedroom",
    clue: "Find all 7 hidden objects in the bedroom!",
    drawBg: drawBedroom,
    items: [
      { emoji: "🔑", label: "key",        x: 0.77, y: 0.28, size: 30 },
      { emoji: "🎈", label: "balloon",    x: 0.15, y: 0.18, size: 34 },
      { emoji: "🎲", label: "dice",       x: 0.52, y: 0.72, size: 30 },
      { emoji: "🧸", label: "teddy bear", x: 0.31, y: 0.55, size: 34 },
      { emoji: "📚", label: "books",      x: 0.88, y: 0.62, size: 30 },
      { emoji: "🕯️", label: "candle",    x: 0.63, y: 0.20, size: 30 },
      { emoji: "🎀", label: "ribbon",     x: 0.21, y: 0.80, size: 30 },
    ]
  },
  {
    name: "Beach",
    clue: "Find all 7 hidden objects at the beach!",
    drawBg: drawBeach,
    items: [
      { emoji: "🦀", label: "crab",       x: 0.18, y: 0.72, size: 34 },
      { emoji: "🌺", label: "flower",     x: 0.80, y: 0.60, size: 30 },
      { emoji: "🐚", label: "shell",      x: 0.55, y: 0.80, size: 30 },
      { emoji: "⚓", label: "anchor",     x: 0.35, y: 0.25, size: 30 },
      { emoji: "🔭", label: "telescope",  x: 0.70, y: 0.18, size: 30 },
      { emoji: "🐠", label: "fish",       x: 0.42, y: 0.50, size: 32 },
      { emoji: "🌟", label: "starfish",   x: 0.88, y: 0.78, size: 30 },
    ]
  }
];

let currentLevel = 0;
let found = [];
let totalClicks = 0;
let timerInterval = null;
let seconds = 0;
let itemEls = [];

function drawPark(ctx, w, h) {
  const sky = ctx.createLinearGradient(0,0,0,h*0.55);
  sky.addColorStop(0,'#87ceeb'); sky.addColorStop(1,'#d0f0ff');
  ctx.fillStyle = sky; ctx.fillRect(0,0,w,h*0.55);
  const gr = ctx.createLinearGradient(0,h*0.48,0,h);
  gr.addColorStop(0,'#7ec850'); gr.addColorStop(1,'#4a9e2a');
  ctx.fillStyle = gr; ctx.fillRect(0,h*0.48,w,h*0.52);
  ctx.fillStyle='#5ab030'; ctx.beginPath();
  ctx.ellipse(w*0.5,h*0.5,w*0.55,h*0.09,0,0,Math.PI*2); ctx.fill();

  function tree(x,y,s){ ctx.fillStyle='#5c3317'; ctx.fillRect(x-s*0.07,y,s*0.14,s*0.5);
    ctx.fillStyle='#2e8b10'; ctx.beginPath(); ctx.arc(x,y-s*0.1,s*0.35,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#3aad17'; ctx.beginPath(); ctx.arc(x,y-s*0.25,s*0.28,0,Math.PI*2); ctx.fill(); }
  tree(w*0.05,h*0.56,80); tree(w*0.16,h*0.51,70); tree(w*0.27,h*0.53,60);
  tree(w*0.40,h*0.49,55); tree(w*0.52,h*0.52,65); tree(w*0.63,h*0.50,58);
  tree(w*0.75,h*0.53,72); tree(w*0.86,h*0.51,85); tree(w*0.96,h*0.55,62);
  tree(w*0.11,h*0.60,48); tree(w*0.33,h*0.58,44); tree(w*0.57,h*0.61,50); tree(w*0.80,h*0.59,46);
  ctx.fillStyle='#b8860b';
  for(let i=0;i<12;i++){ctx.beginPath();ctx.arc(w*(0.3+i*0.035),h*(0.88+Math.sin(i)*0.03),4,0,Math.PI*2);ctx.fill();}
  ctx.strokeStyle='#aaa'; ctx.lineWidth=1.5;
  for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(w*(0.35+i*0.07),h*0.78);ctx.lineTo(w*(0.35+i*0.07),h*0.88);ctx.stroke();}
  ctx.fillStyle='rgba(255,255,255,0.7)';
  [[0.3,0.1,60,22],[0.55,0.06,80,26],[0.72,0.12,50,18]].forEach(([cx,cy,rw,rh])=>{
    ctx.beginPath(); ctx.ellipse(w*cx,h*cy,rw,rh,0,0,Math.PI*2); ctx.fill(); });
}

function drawBedroom(ctx,w,h){
  ctx.fillStyle='#d4b8e0'; ctx.fillRect(0,0,w,h);
  ctx.fillStyle='#c2a0cc'; ctx.fillRect(0,0,w*0.5,h); ctx.fillStyle='#e8d4f0'; ctx.fillRect(w*0.5,0,w*0.5,h);
  ctx.fillStyle='#8b6f8b'; ctx.fillRect(0,h-20,w,20);
  ctx.fillStyle='#6b4f6b'; ctx.fillRect(20,h-20,w-40,8);
  ctx.fillStyle='#4a3a5c'; ctx.fillRect(w*0.05,h*0.45,w*0.5,h*0.45);
  ctx.fillStyle='#5a4a6c'; ctx.fillRect(w*0.07,h*0.35,w*0.2,h*0.12);
  ctx.fillStyle='#3d2b50'; ctx.fillRect(w*0.05,h*0.42,w*0.5,h*0.04);
  ctx.fillStyle='#e8c8a0'; ctx.fillRect(w*0.07,h*0.36,w*0.18,h*0.1);
  ctx.fillStyle='#f5e6c8'; ctx.fillRect(w*0.09,h*0.38,w*0.14,h*0.06);
  ctx.fillStyle='#c8b860'; ctx.fillRect(w*0.08,h*0.37,w*0.02,h*0.01);
  ctx.fillStyle='#c0a060'; ctx.fillRect(w*0.68,h*0.3,w*0.27,h*0.55);
  ctx.fillStyle='#a08040'; ctx.fillRect(w*0.68,h*0.28,w*0.27,h*0.04);
  ctx.fillStyle='#8b6a30'; ctx.fillRect(w*0.69,h*0.35,w*0.12,h*0.2); ctx.fillRect(w*0.82,h*0.35,w*0.12,h*0.2);
  ctx.fillStyle='#fff8e8'; ctx.fillRect(w*0.70,h*0.36,w*0.10,h*0.18); ctx.fillRect(w*0.83,h*0.36,w*0.10,h*0.18);
  ctx.fillStyle='#ffd700';
  ctx.beginPath(); ctx.arc(w*0.155,h*0.67,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.fillRect(w*0.5,0,w*0.5,h);
}

function drawBeach(ctx,w,h){
  const sky=ctx.createLinearGradient(0,0,0,h*0.5);
  sky.addColorStop(0,'#1e90ff'); sky.addColorStop(1,'#87cefa');
  ctx.fillStyle=sky; ctx.fillRect(0,0,w,h*0.5);
  const sea=ctx.createLinearGradient(0,h*0.45,0,h*0.7);
  sea.addColorStop(0,'#006994'); sea.addColorStop(1,'#0099cc');
  ctx.fillStyle=sea; ctx.fillRect(0,h*0.45,w,h*0.25);
  for(let i=0;i<6;i++){ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(w*0.1*i,h*(0.48+i*0.01));ctx.lineTo(w*(0.1*i+0.1),h*(0.49+i*0.01));ctx.stroke();}
  const sand=ctx.createLinearGradient(0,h*0.65,0,h);
  sand.addColorStop(0,'#f4d483'); sand.addColorStop(1,'#e8c15a');
  ctx.fillStyle=sand; ctx.fillRect(0,h*0.65,w,h*0.35);
  ctx.fillStyle='#5c9e2a'; ctx.fillRect(w*0.05,h*0.62,8,h*0.15);
  ctx.fillStyle='#4a8a1a'; ctx.beginPath(); ctx.ellipse(w*0.05,h*0.6,20,12,0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.75)';
  [[0.25,0.12,55,18],[0.6,0.08,75,22],[0.82,0.15,45,15]].forEach(([cx,cy,rw,rh])=>{
    ctx.beginPath(); ctx.ellipse(w*cx,h*cy,rw,rh,0,0,Math.PI*2); ctx.fill(); });
  ctx.fillStyle='#c8a020'; ctx.fillRect(w*0.4,h*0.62,6,h*0.2);
  ctx.fillStyle='#e83030'; ctx.beginPath(); ctx.moveTo(w*0.41,h*0.62);
  ctx.lineTo(w*0.58,h*0.67); ctx.lineTo(w*0.41,h*0.72); ctx.fill();
}

function formatTime(s){const m=Math.floor(s/60);const ss=s%60;return m+':'+(ss<10?'0':'')+ss;}

function loadLevel(idx){
  document.querySelectorAll('.level-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  currentLevel=idx;
  const lv=levels[idx];
  found=new Array(lv.items.length).fill(false);
  totalClicks=0;
  seconds=0;
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{ if(found.every(Boolean))return; seconds++; document.getElementById('timer').textContent=formatTime(seconds); },1000);
  document.getElementById('score').textContent='0 / '+lv.items.length;
  document.getElementById('clicks').textContent='0';
  document.getElementById('timer').textContent='0:00';
  document.getElementById('progress-bar').style.width='0%';
  document.getElementById('clue-banner').textContent=lv.clue;
  document.getElementById('win-screen').classList.remove('show');

  const canvas=document.getElementById('scene-canvas');
  const ctx=canvas.getContext('2d');
  lv.drawBg(ctx,canvas.width,canvas.height);

  itemEls.forEach(el=>el.remove());
  itemEls=[];
  const wrapper=document.getElementById('scene-wrapper');

  lv.items.forEach((item,i)=>{
    const el=document.createElement('div');
    el.className='spy-item';
    el.textContent=item.emoji;
    el.title=item.label;
    el.style.width=item.size+'px';
    el.style.height=item.size+'px';
    el.style.left='calc('+item.x*100+'% - '+(item.size/2)+'px)';
    el.style.top='calc('+item.y*100+'% - '+(item.size/2)+'px)';
    el.addEventListener('click',()=>handleFind(i));
    wrapper.appendChild(el);
    itemEls.push(el);
  });

  buildFoundList(lv);
}

function buildFoundList(lv){
  const list=document.getElementById('found-list');
  list.innerHTML='';
  lv.items.forEach((item,i)=>{
    const badge=document.createElement('div');
    badge.className='found-badge'+(found[i]?' done':'');
    badge.id='badge-'+i;
    badge.innerHTML='<span class="badge-icon">'+item.emoji+'</span>'+item.label;
    list.appendChild(badge);
  });
}

function handleFind(idx){
  if(found[idx])return;
  totalClicks++;
  document.getElementById('clicks').textContent=totalClicks;
  found[idx]=true;
  itemEls[idx].classList.add('found');
  document.getElementById('badge-'+idx).classList.add('done');
  const cnt=found.filter(Boolean).length;
  const total=levels[currentLevel].items.length;
  document.getElementById('score').textContent=cnt+' / '+total;
  document.getElementById('progress-bar').style.width=(cnt/total*100)+'%';
  const flash=document.getElementById('found-flash');
  flash.textContent='Found the '+levels[currentLevel].items[idx].label+'! 🎉';
  flash.classList.add('show');
  setTimeout(()=>flash.classList.remove('show'),1200);
  if(cnt===total){ clearInterval(timerInterval); setTimeout(showWin,600); }
}

function showWin(){
  document.getElementById('win-stats').textContent='Completed in '+formatTime(seconds)+' with '+totalClicks+' clicks!';
  document.getElementById('win-screen').classList.add('show');
}

loadLevel(0);
</script>
</body>
</html>
